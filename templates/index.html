<!DOCTYPE html>
<html>
<head>
    <title>SmartTech Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>

<div class="main-container">

    <div class="history-panel">
        <div class="sidebar-top">
            <button class="icon-btn sidebar-menu" aria-label="Menu">
                <img src="/static/image/list.svg" alt="Menu">
            </button>
            <button id="sidebar-search" class="icon-btn sidebar-search" aria-label="Search">
                <img src="/static/image/magnifying-glass.svg" alt="Search">
            </button>
        </div>

        <button id="new-chat-btn" class="new-chat-btn">+ New Chat</button>

        <div class="sidebar-divider"></div>
        <div class="sidebar-title">Recent Chats</div>
        <ul id="history-list"></ul>
    </div>

    <div class="chat-container centered">
        <div class="chat-logo">
            <img src="/static/image/logo-text.png" alt="Lexa logo text" />
        </div>

        <div id="welcome" class="welcome">
            <img src="/static/image/logo-img.png" alt="Lexa logo" class="welcome-logo" />
            <div class="welcome-text">
                <p>Lexa here! Tell me what you need in a laptop, and let's find it.</p>
            </div>
        </div>

        <div id="chat-box"></div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="How can I help you today?">
            <button id="send-btn" onclick="sendMessage()" aria-label="Send">
                <img src="/static/image/arrow-circle-right.svg" alt="Send">
            </button>
        </div>
    </div>
</div>

<script src="/static/script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</body>
</html>
